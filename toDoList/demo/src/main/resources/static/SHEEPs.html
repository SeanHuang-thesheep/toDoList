<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHEEP's ToDoList</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(255, 214, 102, 0.32), transparent 32%),
        radial-gradient(circle at bottom right, rgba(120, 190, 140, 0.24), transparent 36%),
        linear-gradient(135deg, #fffaf0 0%, #f4f1e8 50%, #eef7ee 100%);
      color: #1d1d1f;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px;
    }

    .app {
      width: 100%;
      max-width: 1100px;
      min-height: 680px;
      display: grid;
      grid-template-columns: 360px 1fr;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(28px);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 34px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.12);
      overflow: hidden;
    }

    .sidebar {
      padding: 42px 34px;
      background: rgba(255, 255, 255, 0.58);
      border-right: 1px solid rgba(0, 0, 0, 0.06);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .logo {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background: linear-gradient(145deg, #f5c542, #7fb77e);
      color: #2b2b2b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      box-shadow: 0 12px 30px rgba(127, 183, 126, 0.28);
      margin-bottom: 28px;
    }

    h1 {
      font-size: 38px;
      letter-spacing: -1.4px;
      line-height: 1.05;
      margin-bottom: 14px;
    }

    .subtitle {
      font-size: 16px;
      color: #6e6e73;
      line-height: 1.6;
    }

    .hero-subtitle {
      font-size: 14px;
      line-height: 1.4;
      white-space: nowrap;
      letter-spacing: -0.2px;
    }

    .user-card {
      display: none;
      margin-top: 30px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    .user-card strong {
      display: block;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .user-card span {
      font-size: 13px;
      color: #86868b;
    }

    .main {
      padding: 42px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .auth-panel,
    .todo-panel {
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.06);
    }

    .todo-panel {
      display: none;
      flex: 1;
    }

    .tabs {
      display: flex;
      gap: 10px;
      background: #f2f2f7;
      border-radius: 18px;
      padding: 6px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      border: none;
      border-radius: 14px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      background: transparent;
      color: #6e6e73;
      cursor: pointer;
      transition: 0.22s ease;
    }

    .tab-btn.active {
      background: white;
      color: #1d1d1f;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    .form {
      display: none;
    }

    .form.active {
      display: block;
    }

    .form-title,
    .section-title {
      font-size: 26px;
      letter-spacing: -0.8px;
      margin-bottom: 18px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #6e6e73;
      margin-bottom: 7px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(0, 0, 0, 0.1);
      outline: none;
      border-radius: 16px;
      padding: 14px 15px;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.86);
      transition: 0.2s ease;
    }

    textarea {
      resize: vertical;
      min-height: 86px;
    }

    input:focus,
    textarea:focus {
      border-color: #7fb77e;
      box-shadow: 0 0 0 4px rgba(127, 183, 126, 0.16);
    }

    .btn {
      border: none;
      border-radius: 16px;
      padding: 13px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-primary {
      width: 100%;
      background: #7fb77e;
      color: white;
      box-shadow: 0 12px 24px rgba(127, 183, 126, 0.24);
    }

    .btn-primary:hover {
      background: #6aa66a;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #f2f2f7;
      color: #1d1d1f;
    }

    .btn-danger {
      background: #ff3b30;
      color: white;
    }

    .btn-small {
      padding: 9px 12px;
      font-size: 13px;
      border-radius: 12px;
    }

    .message {
      margin-top: 14px;
      font-size: 14px;
      color: #6e6e73;
      min-height: 20px;
    }

    .success {
      color: #248a3d;
    }

    .error {
      color: #d70015;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 22px;
    }

    .todo-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 24px;
    }

    .todo-form .full {
      grid-column: 1 / -1;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 430px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .todo-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: flex-start;
      padding: 18px;
      border-radius: 22px;
      background: white;
      border: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.05);
    }

    .todo-check {
      width: 22px;
      height: 22px;
      margin-top: 2px;
      accent-color: #7fb77e;
      cursor: pointer;
    }

    .todo-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .todo-title.done {
      color: #86868b;
      text-decoration: line-through;
    }

    .todo-desc {
      font-size: 14px;
      color: #6e6e73;
      line-height: 1.45;
      margin-bottom: 8px;
    }

    .todo-date {
      font-size: 12px;
      color: #86868b;
    }

    .todo-actions {
      display: flex;
      gap: 8px;
    }

    .empty {
      text-align: center;
      padding: 50px 20px;
      color: #86868b;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 22px;
      border: 1px dashed rgba(0, 0, 0, 0.12);
    }

    @media (max-width: 860px) {
      body {
        padding: 16px;
      }

      .app {
        grid-template-columns: 1fr;
        border-radius: 26px;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      }

      .main {
        padding: 24px;
      }

      .todo-form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div>
        <div class="logo">🐑</div>
        <h1>SHEEP's<br />ToDoList</h1>
        <p class="subtitle hero-subtitle">Hope You Have A Great Great Day</p>
        <div class="user-card" id="userCard">
          <strong id="displayUsername">User</strong>
          <span id="displayUserId">User ID</span>
        </div>
      </div>
      <p class="subtitle">API Base: <span id="apiBaseText"></span></p>
    </aside>

    <main class="main">
      <section class="auth-panel" id="authPanel">
        <div class="tabs">
          <button class="tab-btn active" id="loginTab" onclick="showAuthForm('login')">Login</button>
          <button class="tab-btn" id="registerTab" onclick="showAuthForm('register')">Register</button>
        </div>

        <form class="form active" id="loginForm" onsubmit="login(event)">
          <h2 class="form-title">Welcome back</h2>
          <div class="input-group">
            <label>Username</label>
            <input type="text" id="loginUsername" placeholder="Enter username" required />
          </div>
          <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter password" required />
          </div>
          <button class="btn btn-primary" type="submit">Login</button>
          <p class="message" id="loginMessage"></p>
        </form>

        <form class="form" id="registerForm" onsubmit="register(event)">
          <h2 class="form-title">Create account</h2>
          <div class="input-group">
            <label>Username</label>
            <input type="text" id="registerUsername" placeholder="Choose username" required />
          </div>
          <div class="input-group">
            <label>Email</label>
            <input type="email" id="registerEmail" placeholder="Enter email" />
          </div>
          <div class="input-group">
            <label>Password</label>
            <input type="password" id="registerPassword" placeholder="Choose password" required />
          </div>
          <button class="btn btn-primary" type="submit">Register</button>
          <p class="message" id="registerMessage"></p>
        </form>
      </section>

      <section class="todo-panel" id="todoPanel">
        <div class="topbar">
          <h2 class="section-title">My Tasks</h2>
          <button class="btn btn-secondary btn-small" onclick="logout()">Logout</button>
        </div>

        <form class="todo-form" onsubmit="saveTodo(event)">
          <input type="hidden" id="editingTodoId" />

          <div class="input-group full">
            <label>Title</label>
            <input type="text" id="todoTitle" placeholder="What do you need to do?" required />
          </div>

          <div class="input-group full">
            <label>Description</label>
            <textarea id="todoDescription" placeholder="Add more details"></textarea>
          </div>

          <div class="input-group">
            <label>Due Date & Time</label>
            <input type="datetime-local" id="todoDueDatetime" />
          </div>

          <div class="input-group">
            <label>Status</label>
            <select id="todoCompleted" style="width:100%;border:1px solid rgba(0,0,0,.1);border-radius:16px;padding:14px 15px;font-size:15px;background:white;outline:none;">
              <option value="false">Not completed</option>
              <option value="true">Completed</option>
            </select>
          </div>

          <button class="btn btn-primary full" type="submit" id="saveTodoBtn">Add Todo</button>
          <button class="btn btn-secondary full" type="button" id="cancelEditBtn" onclick="cancelEdit()" style="display:none;">Cancel Edit</button>
        </form>

        <div class="todo-list" id="todoList"></div>
      </section>
    </main>
  </div>

  <script>
    const API_BASE_URL = "http://localhost:8080";

    document.getElementById("apiBaseText").textContent = API_BASE_URL;

    function getUserId() {
      return localStorage.getItem("userId");
    }

    function getUsername() {
      return localStorage.getItem("username");
    }

    function showAuthForm(type) {
      const isLogin = type === "login";

      document.getElementById("loginForm").classList.toggle("active", isLogin);
      document.getElementById("registerForm").classList.toggle("active", !isLogin);
      document.getElementById("loginTab").classList.toggle("active", isLogin);
      document.getElementById("registerTab").classList.toggle("active", !isLogin);
    }

    function setMessage(id, text, type) {
      const element = document.getElementById(id);
      element.textContent = text;
      element.className = `message ${type || ""}`;
    }

    async function apiRequest(path, options = {}) {
      const response = await fetch(`${API_BASE_URL}${path}`, {
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {})
        },
        ...options
      });

      const result = await response.json();
      return result;
    }

    async function register(event) {
      event.preventDefault();

      const username = document.getElementById("registerUsername").value.trim();
      const email = document.getElementById("registerEmail").value.trim();
      const password = document.getElementById("registerPassword").value;

      try {
        const result = await apiRequest("/auth/register", {
          method: "POST",
          body: JSON.stringify({ username, email, password })
        });

        if (result.code === 1) {
          setMessage("registerMessage", "Register successful. Please login.", "success");
          document.getElementById("registerForm").reset();
          showAuthForm("login");
        } else {
          setMessage("registerMessage", result.msg || "Register failed", "error");
        }
      } catch (error) {
        setMessage("registerMessage", "Cannot connect to backend server", "error");
      }
    }

    async function login(event) {
      event.preventDefault();

      const username = document.getElementById("loginUsername").value.trim();
      const password = document.getElementById("loginPassword").value;

      try {
        const result = await apiRequest("/auth/login", {
          method: "POST",
          body: JSON.stringify({ username, password })
        });

        if (result.code === 1) {
          localStorage.setItem("userId", result.data.userId);
          localStorage.setItem("username", result.data.username);
          setMessage("loginMessage", "Login successful", "success");
          showTodoPage();
          loadTodos();
        } else {
          setMessage("loginMessage", result.msg || "Login failed", "error");
        }
      } catch (error) {
        setMessage("loginMessage", "Cannot connect to backend server", "error");
      }
    }

    function showTodoPage() {
      document.getElementById("authPanel").style.display = "none";
      document.getElementById("todoPanel").style.display = "block";
      document.getElementById("userCard").style.display = "block";
      document.getElementById("displayUsername").textContent = getUsername() || "User";
      document.getElementById("displayUserId").textContent = `User ID: ${getUserId()}`;
    }

    function showAuthPage() {
      document.getElementById("authPanel").style.display = "block";
      document.getElementById("todoPanel").style.display = "none";
      document.getElementById("userCard").style.display = "none";
    }

    function logout() {
      localStorage.removeItem("userId");
      localStorage.removeItem("username");
      showAuthPage();
    }

    async function loadTodos() {
      const userId = getUserId();
      const todoList = document.getElementById("todoList");
      todoList.innerHTML = `<div class="empty">Loading tasks...</div>`;

      try {
        const result = await apiRequest(`/todos?userId=${userId}`, {
          method: "GET"
        });

        if (result.code === 1) {
          renderTodos(result.data || []);
        } else {
          todoList.innerHTML = `<div class="empty">${result.msg || "Failed to load tasks"}</div>`;
        }
      } catch (error) {
        todoList.innerHTML = `<div class="empty">Cannot connect to backend server</div>`;
      }
    }

    function renderTodos(todos) {
      const todoList = document.getElementById("todoList");

      if (!todos.length) {
        todoList.innerHTML = `<div class="empty">No tasks yet. Add your first todo.</div>`;
        return;
      }

      todoList.innerHTML = todos.map(todo => {
        const safeTitle = escapeHtml(todo.title || "Untitled");
        const safeDescription = escapeHtml(todo.description || "");
        const dueDate = todo.dueDatetime ? formatDate(todo.dueDatetime) : "No due date";

        return `
          <div class="todo-item">
            <input
              class="todo-check"
              type="checkbox"
              ${todo.completed ? "checked" : ""}
              onchange="updateTodoStatus(${todo.id}, this.checked)"
            />

            <div>
              <div class="todo-title ${todo.completed ? "done" : ""}">${safeTitle}</div>
              <div class="todo-desc">${safeDescription}</div>
              <div class="todo-date">Due: ${dueDate}</div>
            </div>

            <div class="todo-actions">
              <button class="btn btn-secondary btn-small" onclick='startEdit(${JSON.stringify(todo)})'>Edit</button>
              <button class="btn btn-danger btn-small" onclick="deleteTodo(${todo.id})">Delete</button>
            </div>
          </div>
        `;
      }).join("");
    }

    async function saveTodo(event) {
      event.preventDefault();

      const editingTodoId = document.getElementById("editingTodoId").value;
      const title = document.getElementById("todoTitle").value.trim();
      const description = document.getElementById("todoDescription").value.trim();
      const dueDatetime = document.getElementById("todoDueDatetime").value || null;
      const completed = document.getElementById("todoCompleted").value === "true";

      if (editingTodoId) {
        await updateTodo(editingTodoId, { title, description, completed, dueDatetime });
      } else {
        await createTodo({
          userId: Number(getUserId()),
          title,
          description,
          dueDatetime
        });
      }
    }

    async function createTodo(todoData) {
      try {
        const result = await apiRequest("/todos", {
          method: "POST",
          body: JSON.stringify(todoData)
        });

        if (result.code === 1) {
          clearTodoForm();
          loadTodos();
        } else {
          alert(result.msg || "Failed to create todo");
        }
      } catch (error) {
        alert("Cannot connect to backend server");
      }
    }

    async function updateTodo(id, todoData) {
      try {
        const result = await apiRequest(`/todos/${id}`, {
          method: "PUT",
          body: JSON.stringify(todoData)
        });

        if (result.code === 1) {
          clearTodoForm();
          loadTodos();
        } else {
          alert(result.msg || "Failed to update todo");
        }
      } catch (error) {
        alert("Cannot connect to backend server");
      }
    }

    async function updateTodoStatus(id, completed) {
      try {
        const result = await apiRequest(`/todos/${id}/status`, {
          method: "PATCH",
          body: JSON.stringify({ completed })
        });

        if (result.code === 1) {
          loadTodos();
        } else {
          alert(result.msg || "Failed to update status");
        }
      } catch (error) {
        alert("Cannot connect to backend server");
      }
    }

    async function deleteTodo(id) {
      const confirmed = confirm("Are you sure you want to delete this todo?");
      if (!confirmed) return;

      try {
        const result = await apiRequest(`/todos/${id}`, {
          method: "DELETE"
        });

        if (result.code === 1) {
          loadTodos();
        } else {
          alert(result.msg || "Failed to delete todo");
        }
      } catch (error) {
        alert("Cannot connect to backend server");
      }
    }

    function startEdit(todo) {
      document.getElementById("editingTodoId").value = todo.id;
      document.getElementById("todoTitle").value = todo.title || "";
      document.getElementById("todoDescription").value = todo.description || "";
      document.getElementById("todoCompleted").value = String(Boolean(todo.completed));
      document.getElementById("todoDueDatetime").value = convertToDatetimeLocal(todo.dueDatetime);
      document.getElementById("saveTodoBtn").textContent = "Update Todo";
      document.getElementById("cancelEditBtn").style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function cancelEdit() {
      clearTodoForm();
    }

    function clearTodoForm() {
      document.getElementById("editingTodoId").value = "";
      document.getElementById("todoTitle").value = "";
      document.getElementById("todoDescription").value = "";
      document.getElementById("todoDueDatetime").value = "";
      document.getElementById("todoCompleted").value = "false";
      document.getElementById("saveTodoBtn").textContent = "Add Todo";
      document.getElementById("cancelEditBtn").style.display = "none";
    }

    function convertToDatetimeLocal(value) {
      if (!value) return "";
      return value.substring(0, 16);
    }

    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString();
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    window.onload = function () {
      if (getUserId()) {
        showTodoPage();
        loadTodos();
      } else {
        showAuthPage();
      }
    };
  </script>
</body>
</html>
